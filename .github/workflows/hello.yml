name: Terraform Pipeline Simulation

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running terraform fmt"

  init:
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running terraform init"

  plan:
    needs: init
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running terraform plan"

  apply:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running terraform apply"